version: "3.9"

services:

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: podoptix-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: podoptix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: podoptix-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
