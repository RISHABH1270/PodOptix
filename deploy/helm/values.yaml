image:
  repository: podoptix/hub
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  host: podoptix.example.com
  tls: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# secrets — override in production via --set or external secret manager
secrets:
  databaseURL:   "postgres://postgres:password@postgres:5432/podoptix?sslmode=disable"
  redisURL:      "redis://redis:6379"
  jwtSecret:     "change-me-to-a-long-random-secret"
  encryptionKey: "change-me-to-a-32-byte-random-key!"
