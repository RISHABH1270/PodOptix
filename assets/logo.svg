<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="amberDim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background — deep slate -->
  <rect width="200" height="200" fill="#0F172A" rx="28"/>

  <!-- Outer subtle ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.12"/>

  <!-- Hexagon — Kubernetes nod -->
  <polygon points="100,32 158,66 158,134 100,168 42,134 42,66"
           fill="url(#amberDim)" stroke="url(#amber)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Bold P -->
  <text x="75" y="128" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="82" font-weight="800" fill="url(#amber)" letter-spacing="-2">P</text>

  <!-- Subscript dot — precision indicator -->
  <circle cx="134" cy="140" r="6" fill="#FBBF24"/>

</svg>
