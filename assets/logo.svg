<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="arc" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#0F172A" rx="28"/>

  <!-- Gauge track — full arc (dim) -->
  <path d="M 36 140 A 72 72 0 0 1 164 140"
        fill="none" stroke="#334155" stroke-width="10" stroke-linecap="round"/>

  <!-- Gauge fill — optimal zone (bright amber) -->
  <path d="M 36 140 A 72 72 0 0 1 120 55"
        fill="none" stroke="url(#arc)" stroke-width="10" stroke-linecap="round"/>

  <!-- Needle — pointing to optimal mark -->
  <line x1="100" y1="132" x2="118" y2="58"
        stroke="#FBBF24" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Needle pivot -->
  <circle cx="100" cy="132" r="8" fill="#FBBF24"/>
  <circle cx="100" cy="132" r="3.5" fill="#0F172A"/>

</svg>
