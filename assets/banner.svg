<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200">
  <defs>
    <clipPath id="rounded">
      <rect width="860" height="200" rx="12"/>
    </clipPath>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="amberV" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="20%" stop-color="#F59E0B"/>
      <stop offset="80%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <!-- Clip everything to rounded corners -->
  <g clip-path="url(#rounded)">

  <!-- Background -->
  <rect width="860" height="200" fill="url(#bg)"/>

  <!-- Top border line -->
  <rect x="0" y="0" width="860" height="2" fill="url(#borderGrad)" rx="1"/>
  <!-- Bottom border line -->
  <rect x="0" y="198" width="860" height="2" fill="url(#borderGrad)" rx="1"/>

  <!-- Subtle vertical divider -->
  <line x1="218" y1="48" x2="218" y2="152" stroke="#334155" stroke-width="1"/>

  <!-- ── Logo (gauge) ── centered in left panel ──────────────────── -->
  <g transform="translate(60, 52) scale(0.53)">
    <!-- Gauge track -->
    <path d="M 36 140 A 72 72 0 0 1 164 140"
          fill="none" stroke="#334155" stroke-width="10" stroke-linecap="round"/>
    <!-- Gauge fill -->
    <path d="M 36 140 A 72 72 0 0 1 120 55"
          fill="none" stroke="url(#amberV)" stroke-width="10" stroke-linecap="round"/>
    <!-- Needle -->
    <line x1="100" y1="132" x2="118" y2="58"
          stroke="#FBBF24" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Pivot -->
    <circle cx="100" cy="132" r="8" fill="#FBBF24"/>
    <circle cx="100" cy="132" r="3.5" fill="#1E293B"/>
  </g>

  <!-- ── Wordmark ─────────────────────────────────────────────────── -->
  <text x="244" y="98"
        font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="800" fill="url(#amber)" letter-spacing="-1">
    PodOptix
  </text>

  <!-- Tagline -->
  <text x="246" y="130"
        font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
        font-size="13.5" font-weight="400" fill="#94A3B8" letter-spacing="0.5">
    Kubernetes Resource Right-Sizing · Powered by p99
  </text>

  <!-- ── Right side badges ────────────────────────────────────────── -->
  <!-- Version badge -->
  <rect x="692" y="78" width="64" height="24" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="724" y="95" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="11" fill="#94A3B8" text-anchor="middle">v0.1.0</text>

  <!-- MIT badge -->
  <rect x="764" y="78" width="52" height="24" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="790" y="95" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="11" fill="#94A3B8" text-anchor="middle">MIT</text>

  <!-- Go badge -->
  <rect x="692" y="112" width="124" height="24" rx="6" fill="#F59E0B" fill-opacity="0.12" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4"/>
  <text x="754" y="129" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="11" fill="#FBBF24" text-anchor="middle">Built with Go</text>

  </g>
</svg>

