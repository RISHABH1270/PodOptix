<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020c02"/>
      <stop offset="100%" stop-color="#051505"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00CC33"/>
      <stop offset="50%" stop-color="#00FF41"/>
      <stop offset="100%" stop-color="#00CC33"/>
    </linearGradient>
    <pattern id="scan" x="0" y="0" width="860" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="860" height="1" fill="#000000" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" fill="url(#bg)" rx="10"/>

  <!-- Scanlines -->
  <rect width="860" height="200" fill="url(#scan)" rx="10"/>

  <!-- Border -->
  <rect x="1" y="1" width="858" height="198" fill="none" stroke="#00FF41" stroke-width="1.5" rx="10" opacity="0.9"/>

  <!-- Glitch layers -->
  <text x="427" y="116" font-family="sans-serif" font-size="92" font-weight="bold"
        fill="#00FFFF" opacity="0.2" text-anchor="middle" letter-spacing="4">PodOptix</text>
  <text x="433" y="120" font-family="sans-serif" font-size="92" font-weight="bold"
        fill="#39FF14" opacity="0.12" text-anchor="middle" letter-spacing="4">PodOptix</text>

  <!-- Main title -->
  <text x="430" y="118" font-family="sans-serif" font-size="92" font-weight="bold"
        fill="url(#green)" text-anchor="middle" letter-spacing="4">PodOptix</text>

  <!-- Divider -->
  <line x1="240" y1="135" x2="620" y2="135" stroke="#00FF41" stroke-width="0.8" opacity="0.4"/>

  <!-- Tagline -->
  <text x="430" y="163" font-family="monospace" font-size="11" fill="#00FFFF"
        text-anchor="middle" opacity="0.85" letter-spacing="3">[ KUBERNETES RESOURCE RIGHT-SIZING  ·  POWERED BY P99 ]</text>

  <!-- Corner status labels -->
  <text x="20" y="188" font-family="monospace" font-size="9" fill="#00FF41" opacity="0.7">SYS::ACTIVE</text>
  <text x="840" y="188" font-family="monospace" font-size="9" fill="#00FFFF" opacity="0.7" text-anchor="end">v0.1.0</text>
</svg>
